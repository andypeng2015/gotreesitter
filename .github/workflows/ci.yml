name: ci

on:
  push:
    branches: [main, fix/top50-parity-burndown]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'docs/**'
      - '.github/*.md'
  pull_request:
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'docs/**'
      - '.github/*.md'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test Compile
        run: go test ./... -run '^$' -count=1

  race_root:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Root Package Race Tests
        # -timeout 35m: the root package alone needs ~11m under -race on a
        # fast box and more on 2-core runners; Go's default 10m per-package
        # timeout panics the test binary mid-run (dumping in-flight tests as
        # spurious FAILs).
        run: go test . -race -count=1 -timeout 35m

  race_packages:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cmd
            package_filter: '/cmd/'
          - name: grammars
            package_filter: '/grammars$'
          - name: grammargen-support
            package_filter: '/grammargen/'
          - name: parser-result
            package_filter: '/parser_result_test$'
          - name: support
            package_filter: '/grep$|/taproot($|/)'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Non-root Race Tests (${{ matrix.name }})
        # Keep each lane serialized under -race so timing-sensitive tests do
        # not contend with each other on 2-core hosted runners, but split the
        # former all-non-root sweep into package groups so the wall clock stays
        # near the target 10-minute envelope. Keep parser-result and grammargen
        # support out of the grammar registry lane; together they made the
        # aggregate race shard sit near the timeout cap even for data-only PRs.
        # ./grammargen stays visibility-only until its enumerated backlog is
        # burned down and folded back into the blocking suite.
        run: |
          set -euo pipefail
          root="$(go list -m)"
          pkgs="$(
            go list ./... |
              awk -v root="$root" -v pattern="${{ matrix.package_filter }}" '
                $0 == root { next }
                $0 ~ /\/grammargen$/ { next }
                $0 ~ pattern { print }
              '
          )"
          if [ -z "$pkgs" ]; then
            echo "No non-root packages to test for lane ${{ matrix.name }}"
            exit 0
          fi
          go test $pkgs -race -count=1 -timeout 12m -p 1

  grammargen_visibility:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test grammargen (non-blocking visibility)
        # Visibility-only until the enumerated pre-existing backlog is zeroed;
        # known test failures or timeout exits here are SEEN but do not make
        # the PR red. Keep this bounded so visibility cannot dominate the PR
        # check rollup while the blocking build gate has already passed.
        run: |
          set +e
          go test ./grammargen -race -count=1 -timeout 6m
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            echo "::warning::grammargen visibility suite exited with status ${status}; this is informational until the known backlog is burned down."
            {
              echo "### Grammargen Visibility"
              echo
              echo "\`go test ./grammargen -race -count=1 -timeout 6m\` exited with status \`${status}\`."
              echo
              echo "This job is informational until the known grammargen backlog is zeroed."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  draft_focused_tests:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Draft PR Focused Tests
        run: |
          go test . -run '^(TestLookupActionIndexSmallUsesDenseTokenRows|TestLookupActionIndexSmallUsesFullTokenRowsForOtherLanguages|TestLookupActionIndexSmallUsesFullSymbolRowsForGo|TestRawShapePropagatesThroughNoTreeAndCollapsedUnary|TestParseRuntimeReportsNoTreeNodeVolume|TestParseRuntimeReportsNoTreeCheckpointLeavesRemainNodes|TestParseNoTreeBenchmarkDropsRetainedExternalCheckpointCapacity|TestSetLexerErrorRunLexStateUsesCRecoveryGate|TestErrorCostCompetitionLanguageRequiresCapabilityByDefault)$' -count=1

  parity_report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Parity Report (External Blob Mode)
        run: |
          GOTREESITTER_GRAMMAR_BLOB_DIR=grammars/grammar_blobs \
          go run -tags grammar_blobs_external ./cmd/parity_report > parity.log

      - name: Upload Parity Log
        uses: actions/upload-artifact@v4
        with:
          name: parity-log
          path: parity.log

  perf_scan_budget:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cgo_harness/go.mod

      - name: Validate perf scan budget ratchet
        working-directory: cgo_harness
        run: |
          set -euo pipefail
          GOWORK=off go test ./cmd/perf_scan_budget -count=1
          GOWORK=off go run ./cmd/perf_scan_budget \
            -budget perf_scan/perf_ratio_budgets.json

  exhaustive_parity_scope:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_exhaustive: ${{ steps.scope.outputs.run_exhaustive }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: scope
        name: Detect exhaustive parity scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          run_exhaustive=false
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            run_exhaustive=true
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            git diff --name-only "${PR_BASE_SHA}...HEAD" > /tmp/changed-files.txt
            if grep -Eq '^(parser_result_.*\.go|parser_recover_c.*\.go|parser_result_test/.*\.go)$' /tmp/changed-files.txt; then
              run_exhaustive=true
              {
                echo "### Exhaustive parity trigger"
                echo
                echo "Running exhaustive CGo parity because this PR touches parser-result or C-recovery files:"
                echo
                grep -E '^(parser_result_.*\.go|parser_recover_c.*\.go|parser_result_test/.*\.go)$' /tmp/changed-files.txt | sed 's/^/- `/' | sed 's/$/`/'
              } >> "$GITHUB_STEP_SUMMARY"
            else
              {
                echo "### Exhaustive parity trigger"
                echo
                echo "No parser-result or C-recovery files changed; exhaustive CGo parity is skipped."
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          echo "run_exhaustive=${run_exhaustive}" >> "$GITHUB_OUTPUT"

  build:
    needs:
      - compile
      - race_root
      - race_packages
      - draft_focused_tests
      - parity_report
      - perf_scan_budget
      - exhaustive_parity_scope
      - parity-cgo-exhaustive
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Required Build Gate
        env:
          IS_DRAFT: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft == true }}
          COMPILE_RESULT: ${{ needs.compile.result }}
          RACE_ROOT_RESULT: ${{ needs.race_root.result }}
          RACE_PACKAGES_RESULT: ${{ needs.race_packages.result }}
          DRAFT_FOCUSED_RESULT: ${{ needs.draft_focused_tests.result }}
          PARITY_REPORT_RESULT: ${{ needs.parity_report.result }}
          PERF_SCAN_BUDGET_RESULT: ${{ needs.perf_scan_budget.result }}
          EXHAUSTIVE_PARITY_SCOPE_RESULT: ${{ needs.exhaustive_parity_scope.result }}
          EXHAUSTIVE_PARITY_SCOPE: ${{ needs.exhaustive_parity_scope.outputs.run_exhaustive }}
          EXHAUSTIVE_PARITY_RESULT: ${{ needs.parity-cgo-exhaustive.result }}
        run: |
          set -euo pipefail
          failed=0

          require_success() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              echo "::error::${name} finished with result=${result}"
              failed=1
            fi
          }

          require_success "compile" "$COMPILE_RESULT"
          require_success "parity_report" "$PARITY_REPORT_RESULT"
          require_success "perf_scan_budget" "$PERF_SCAN_BUDGET_RESULT"
          require_success "exhaustive_parity_scope" "$EXHAUSTIVE_PARITY_SCOPE_RESULT"

          if [ "$IS_DRAFT" = "true" ]; then
            require_success "draft_focused_tests" "$DRAFT_FOCUSED_RESULT"
          else
            require_success "race_root" "$RACE_ROOT_RESULT"
            require_success "race_packages" "$RACE_PACKAGES_RESULT"
          fi

          if [ "$EXHAUSTIVE_PARITY_SCOPE" = "true" ]; then
            require_success "parity-cgo-exhaustive" "$EXHAUSTIVE_PARITY_RESULT"
          fi

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

          echo "Required build gate passed"

  # Draft PR correctness visibility (NOT a required check).
  #
  # Background: the blocking `race_root` / `race_packages` jobs are
  # intentionally skipped while a PR is a draft, so draft PRs only run the
  # small hand-picked `draft_focused_tests` required-check input instead of
  # the real race suite.
  #
  # That blind spot let a real regression go unseen for weeks: on the
  # codex/glr-parity-buckets campaign PR (#133), root-package RealParser
  # Kotlin parity silently regressed from 40/40 to 22/40 while the PR sat in
  # draft (now fixed) — root-package parity tests never ran on that PR at
  # all, because the focused list didn't cover them and the full suite never
  # ran while draft. The branch also separately accumulated ~25 root-package
  # and ~21 grammars-package pre-existing failures that were never visible
  # in CI for the same reason.
  #
  # This job closes that gap: it runs the root + grammars package suite (no
  # -race, for speed/turnaround) on every draft PR push, so failures are
  # SEEN as they land instead of discovered after the fact.
  #
  # It is intentionally NOT a required check yet (that's a repo
  # branch-protection setting, not this file). With ~46 known pre-existing
  # failures on the campaign branch today, requiring this job would make
  # every draft PR permanently red and block all progress. Once the
  # pre-existing failure count is driven to zero, promote this job to
  # required to turn it into a ratchet.
  draft-correctness:
    # Only meaningful for draft PRs: non-draft PRs already get the blocking
    # race suite through `race_root` and `race_packages`.
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Draft Correctness Suite (root + grammars, no -race)
        run: |
          # No -race: trades race detection for speed so this is cheap
          # enough to run on every draft push. The full -race suite still
          # runs once the PR leaves draft (`race_root` / `race_packages`).
          #
          # -timeout 25m: the root package alone contains two known
          # C#-boundedness tests (TestCSharpDesignerStyleBlockStaysBounded,
          # TestCSharpCJKPartialClassesStayBounded) that currently run
          # ~130-150s each before hitting their internal parser-level
          # timeout and failing. The non-draft race suite does not
          # special-case them either, so mirror that behavior here and give
          # the whole draft visibility run a generous budget.
          go test . ./grammars -count=1 -timeout 25m

  freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check linguist_gen.go freshness
        run: |
          set -euo pipefail
          # Regenerate using the vendored languages.yml to keep the check
          # deterministic (not affected by upstream linguist changes).
          go run ./cmd/gen_linguist \
            -manifest grammars/languages.manifest \
            -languages-yml grammars/languages.yml \
            -out grammars/linguist_gen.go
          if ! git diff --exit-code grammars/linguist_gen.go; then
            echo "::error::grammars/linguist_gen.go is stale. Regenerate:"
            echo "::error::  go run ./cmd/gen_linguist -manifest grammars/languages.manifest -languages-yml grammars/languages.yml"
            exit 1
          fi

      - name: Check grammar blob coverage matches lock
        run: |
          set -euo pipefail

          # Extract grammar names from lock (skip comments and blanks).
          lock_names=$(grep -v '^#' grammars/languages.lock | grep -v '^$' | awk '{print $1}' | sort)
          lock_count=$(echo "$lock_names" | wc -l)

          # Extract grammar names from .bin files.
          blob_names=$(ls grammars/grammar_blobs/*.bin 2>/dev/null | xargs -I{} basename {} .bin | sort)
          blob_count=$(echo "$blob_names" | wc -l)

          # Extract grammar names from embedded_grammars_gen.go. Most wrappers
          # call loadEmbeddedLanguage("name.bin"), but a small number use the
          # preferred-language entrypoint (for override-aware blobs) and pass
          # the raw grammar name instead.
          gen_names=$(
            grep -oP '(?:loadEmbeddedLanguage\("\K[^"]+(?=\.bin"\))|(?:loadPreferredLanguage\("\K[^"]+(?="\))))' \
              grammars/embedded_grammars_gen.go | sort
          )
          gen_count=$(echo "$gen_names" | wc -l)

          echo "lock: $lock_count | blobs: $blob_count | gen functions: $gen_count"

          # Three-way consistency: lock ↔ blobs ↔ gen functions.
          missing_blobs=$(comm -23 <(echo "$lock_names") <(echo "$blob_names"))
          if [ -n "$missing_blobs" ]; then
            echo "::error::Grammar blobs missing for lock entries: $missing_blobs"
            echo "Run: go run ./cmd/ts2go -manifest grammars/languages.lock -outdir ./grammars -package grammars"
            exit 1
          fi

          orphan_blobs=$(comm -13 <(echo "$lock_names") <(echo "$blob_names"))
          if [ -n "$orphan_blobs" ]; then
            echo "::warning::Orphan blobs not in lock file: $orphan_blobs"
          fi

          missing_gen=$(comm -23 <(echo "$lock_names") <(echo "$gen_names"))
          if [ -n "$missing_gen" ]; then
            echo "::error::embedded_grammars_gen.go missing functions for: $missing_gen"
            echo "Run: go run ./cmd/ts2go -manifest grammars/languages.lock -outdir ./grammars -package grammars"
            exit 1
          fi

          if [ "$blob_count" -ne "$lock_count" ] || [ "$gen_count" -ne "$lock_count" ]; then
            echo "::error::Count mismatch — lock: $lock_count, blobs: $blob_count, gen: $gen_count"
            exit 1
          fi

  parity-cgo:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: CGo Parity Smoke Gate
        run: |
          GTS_PARITY_MODE=smoke \
          bash cgo_harness/docker/run_parity_in_docker.sh \
            --label ci-parity-cgo-smoke \
            --memory 8g \
            --cpus 2 \
            --pids 4096 \
            --gomemlimit 6GiB \
            --goflags -p=1 \
            --test-parallel 1 \
            --timeout 20m \
            --run '^TestParityFreshParse$|^TestParityIncrementalParse$|^TestParityHasNoErrors$|^TestParityIssue3Repros$|^TestParityGLRCanaryGo$|^TestParityGLRCanarySet$|^TestParityGLRCapPressureTopLanguages$|^TestParityGateCoverageRatchet$|^TestParityHighlight$'

  parity-cgo-exhaustive:
    needs: exhaustive_parity_scope
    if: needs.exhaustive_parity_scope.outputs.run_exhaustive == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: CGo Structural Parity Exhaustive (Fresh + No Errors + Issue3)
        run: |
          cd cgo_harness
          GTS_PARITY_MODE=exhaustive \
          go test . -tags treesitter_c_parity \
            -run '^TestParityFreshParse$|^TestParityHasNoErrors$|^TestParityIssue3Repros$' \
            -timeout=30m \
            -count=1 -v

      - name: CGo Structural Parity Exhaustive (Incremental + GLR)
        run: |
          cd cgo_harness
          GTS_PARITY_MODE=exhaustive \
          go test . -tags treesitter_c_parity \
            -run '^TestParityIncrementalParse$|^TestParityGLRCanaryGo$|^TestParityGLRCanarySet$|^TestParityGLRCapPressureTopLanguages$|^TestParityGateCoverageRatchet$' \
            -timeout=30m \
            -count=1 -v

      - name: CGo Structural Parity Exhaustive (Corpus)
        run: |
          cd cgo_harness
          GTS_PARITY_MODE=exhaustive \
          go test . -tags treesitter_c_parity \
            -run '^TestParityCorpusFreshParse$' \
            -timeout=30m \
            -count=1 -v

      - name: CGo Highlight + YAML Parity Exhaustive
        run: |
          cd cgo_harness
          GTS_PARITY_MODE=exhaustive \
          go test . -tags treesitter_c_parity \
            -run '^TestParityHighlight$|^TestParityHighlightAllGrammars$|^TestParityYAMLCorpus$|^TestParityYAMLCorpusStructural$|^TestParityYAMLCorpusSummary$' \
            -timeout=30m \
            -count=1 -v

  perf-regression:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Benchmark Base vs Head
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          DRAFT_PR: ${{ github.event.pull_request.draft }}
          PERF_LEGACY_BASE_SHA: 7a29f591d7fcc54b3d0639b3e38a1bacd8fcb386
          # Contract rebased for the v0.21.0 engine (second rebase; the first
          # accepted the forest-default profile move). The generalized
          # GLR+C-recovery engine deliberately changed the Go full-parse
          # path (go held out of forest defaults, ASI external scanner,
          # recovery hooks): B/op −91%, allocs −80%, incremental at parity
          # with 0 allocs everywhere; full-parse ns is microarchitecture-
          # dependent vs the old path (−20% on modern cores, +17% on 2-core
          # CI runners) and the runner-side delta is consciously accepted —
          # reclaim tracked in the post-v0.21.0 ledger. Gate future PRs
          # against this engine's profile, not the retired one's.
          PERF_BENCH_CONTRACT_BASE_SHA: 1e2e96f185d6a1e5261677d3bee4ff2b69731f07
        run: |
          set -euo pipefail

          BENCH_RE='^(BenchmarkGoParseFullDFA|BenchmarkGoParseIncrementalSingleByteEditDFA|BenchmarkGoParseIncrementalNoEditDFA)$'
          OUT_DIR="${RUNNER_TEMP}/bench-gate"
          BASE_TREE="${RUNNER_TEMP}/bench-base"
          mkdir -p "${OUT_DIR}"

          GATE_BASE_SHA="${BASE_SHA}"
          if git fetch --no-tags origin "${PERF_BENCH_CONTRACT_BASE_SHA}" >/dev/null 2>&1; then
            if ! git merge-base --is-ancestor "${PERF_BENCH_CONTRACT_BASE_SHA}" "${BASE_SHA}"; then
              GATE_BASE_SHA="${PERF_BENCH_CONTRACT_BASE_SHA}"
            fi
          fi
          if [ "${GATE_BASE_SHA}" = "${BASE_SHA}" ] && git fetch --no-tags origin "${PERF_LEGACY_BASE_SHA}" >/dev/null 2>&1; then
            if ! git merge-base --is-ancestor "${PERF_LEGACY_BASE_SHA}" "${BASE_SHA}"; then
              GATE_BASE_SHA="${PERF_LEGACY_BASE_SHA}"
            fi
          fi
          echo "perf gate base: ${GATE_BASE_SHA} (pr base: ${BASE_SHA})"

          # The legacy base needs a higher node budget for comparable full-parse
          # results. The benchmark-contract floor already uses current settings.
          BENCH_NODE_SCALE=""
          if [ "${GATE_BASE_SHA}" = "${PERF_LEGACY_BASE_SHA}" ]; then
            BENCH_NODE_SCALE="3"
            echo "perf gate: using GOT_PARSE_NODE_LIMIT_SCALE=${BENCH_NODE_SCALE} for benchmark comparability"
          fi

          git fetch --no-tags origin "${BASE_SHA}" "${GATE_BASE_SHA}"
          git worktree add "${BASE_TREE}" "${GATE_BASE_SHA}"
          trap 'git worktree remove --force "${BASE_TREE}"' EXIT

          export GOMAXPROCS=1
          if [ -n "${BENCH_NODE_SCALE}" ]; then
            (cd "${BASE_TREE}" && GOT_PARSE_NODE_LIMIT_SCALE="${BENCH_NODE_SCALE}" go test -run '^$' -bench "${BENCH_RE}" -benchmem -count=10 -benchtime=750ms .) > "${OUT_DIR}/base.txt"
            GOT_PARSE_NODE_LIMIT_SCALE="${BENCH_NODE_SCALE}" go test -run '^$' -bench "${BENCH_RE}" -benchmem -count=10 -benchtime=750ms . > "${OUT_DIR}/head.txt"
          else
            (cd "${BASE_TREE}" && go test -run '^$' -bench "${BENCH_RE}" -benchmem -count=10 -benchtime=750ms .) > "${OUT_DIR}/base.txt"
            go test -run '^$' -bench "${BENCH_RE}" -benchmem -count=10 -benchtime=750ms . > "${OUT_DIR}/head.txt"
          fi
          if [ "${GATE_BASE_SHA}" != "${BASE_SHA}" ]; then
            PR_BASE_TREE="${RUNNER_TEMP}/bench-pr-base"
            git worktree add "${PR_BASE_TREE}" "${BASE_SHA}"
            if [ -n "${BENCH_NODE_SCALE}" ]; then
              (cd "${PR_BASE_TREE}" && GOT_PARSE_NODE_LIMIT_SCALE="${BENCH_NODE_SCALE}" go test -run '^$' -bench "${BENCH_RE}" -benchmem -count=10 -benchtime=750ms .) > "${OUT_DIR}/pr_base.txt"
            else
              (cd "${PR_BASE_TREE}" && go test -run '^$' -bench "${BENCH_RE}" -benchmem -count=10 -benchtime=750ms .) > "${OUT_DIR}/pr_base.txt"
            fi
            git worktree remove --force "${PR_BASE_TREE}"
            echo "informational compare vs PR base (non-blocking):"
            if ! go run ./cmd/benchgate \
              -base "${OUT_DIR}/pr_base.txt" \
              -head "${OUT_DIR}/head.txt" \
              -max-ns-regression 10 \
              -max-bytes-regression 10 \
              -max-allocs-regression 10; then
              echo "informational compare vs PR base unavailable (missing benchmarks/metrics)"
            fi
          fi

          BASE_RSS_BIN="${OUT_DIR}/base_rss.test"
          HEAD_RSS_BIN="${OUT_DIR}/head_rss.test"
          (cd "${BASE_TREE}" && go test -c -o "${BASE_RSS_BIN}" .)
          go test -c -o "${HEAD_RSS_BIN}" .

          if [ -n "${BENCH_NODE_SCALE}" ]; then
            (
              cd "${BASE_TREE}" && \
              GOT_BENCH_FUNC_COUNT=5000 GOT_PARSE_NODE_LIMIT_SCALE="${BENCH_NODE_SCALE}" /usr/bin/time -v \
              "${BASE_RSS_BIN}" -test.run '^$' -test.bench '^BenchmarkGoParseFullDFA$' -test.benchmem -test.count=1 -test.benchtime=3x \
              > "${OUT_DIR}/base_rss_bench.txt" 2> "${OUT_DIR}/base_rss_time.txt"
            )
            GOT_BENCH_FUNC_COUNT=5000 GOT_PARSE_NODE_LIMIT_SCALE="${BENCH_NODE_SCALE}" /usr/bin/time -v \
              "${HEAD_RSS_BIN}" -test.run '^$' -test.bench '^BenchmarkGoParseFullDFA$' -test.benchmem -test.count=1 -test.benchtime=3x \
              > "${OUT_DIR}/head_rss_bench.txt" 2> "${OUT_DIR}/head_rss_time.txt"
          else
            (
              cd "${BASE_TREE}" && \
              GOT_BENCH_FUNC_COUNT=5000 /usr/bin/time -v \
              "${BASE_RSS_BIN}" -test.run '^$' -test.bench '^BenchmarkGoParseFullDFA$' -test.benchmem -test.count=1 -test.benchtime=3x \
              > "${OUT_DIR}/base_rss_bench.txt" 2> "${OUT_DIR}/base_rss_time.txt"
            )
            GOT_BENCH_FUNC_COUNT=5000 /usr/bin/time -v \
              "${HEAD_RSS_BIN}" -test.run '^$' -test.bench '^BenchmarkGoParseFullDFA$' -test.benchmem -test.count=1 -test.benchtime=3x \
              > "${OUT_DIR}/head_rss_bench.txt" 2> "${OUT_DIR}/head_rss_time.txt"
          fi

          # benchgate applies a minimum +1 alloc/op floor for low-allocation
          # benches, so we can keep strict ratio thresholds.
          gate_status=0
          go run ./cmd/benchgate \
            -base "${OUT_DIR}/base.txt" \
            -head "${OUT_DIR}/head.txt" \
            -base-rss "${OUT_DIR}/base_rss_time.txt" \
            -head-rss "${OUT_DIR}/head_rss_time.txt" \
            -max-ns-regression 0.08 \
            -max-bytes-regression 0.05 \
            -max-allocs-regression 0.05 \
            -max-rss-regression 0.10 || gate_status=$?

          if [ "${gate_status}" -ne 0 ]; then
            if [ "${DRAFT_PR}" = "true" ]; then
              echo "::warning::perf regression gate failed on draft PR; keeping artifacts and summary non-blocking until the campaign branch exits draft"
              {
                echo "### Draft Perf Gate"
                echo ""
                echo "- outcome: \`NON_BLOCKING_FAILURE\`"
                echo "- reason: draft campaign branch keeps perf data visible without blocking CI"
                echo "- merge gate: same thresholds become blocking once the PR leaves draft"
              } >> "${GITHUB_STEP_SUMMARY}"
            else
              exit "${gate_status}"
            fi
          fi

      - name: Perf Definitive Outcome Summary
        if: always()
        run: |
          set -euo pipefail
          OUT_DIR="${RUNNER_TEMP}/bench-gate"
          if [ ! -f "${OUT_DIR}/base.txt" ] || [ ! -f "${OUT_DIR}/head.txt" ]; then
            {
              echo "### Perf Definitive Outcome"
              echo ""
              echo "- outcome: \`INCONCLUSIVE\`"
              echo "- reason: benchmark artifacts missing"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          go run ./cmd/benchgate \
            -base "${OUT_DIR}/base.txt" \
            -head "${OUT_DIR}/head.txt" \
            -max-ns-regression 0.08 \
            -max-bytes-regression 0.05 \
            -max-allocs-regression 0.05 \
            -exit-on-fail=false \
            -post-definitive \
            -definitive-output "${OUT_DIR}/definitive.md" || true

          if [ -f "${OUT_DIR}/definitive.md" ]; then
            cat "${OUT_DIR}/definitive.md" >> "${GITHUB_STEP_SUMMARY}"
          else
            {
              echo "### Perf Definitive Outcome"
              echo ""
              echo "- outcome: \`INCONCLUSIVE\`"
              echo "- reason: no definitive win/loss from current thresholds"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload Perf Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-gate-artifacts
          path: ${{ runner.temp }}/bench-gate
